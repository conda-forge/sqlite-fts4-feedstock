{% set name = "sqlite-fts4" %}
{% set version = "1.0.3" %}


package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/sqlite-fts4-{{ version }}.tar.gz
  sha256: 78b05eeaf6680e9dbed8986bde011e9c086a06cb0c931b3cf7da94c214e8930c

build:
  number: 1
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv

requirements:
  host:
    - pip
    - python {{ python_min }}
  run:
    - python >={{ python_min }}

test:
  imports:
    - sqlite_fts4
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/simonw/sqlite-fts4
  summary: Python functions for working with SQLite FTS4 search
  license: Apache-2.0
  license_file: LICENSE

extra:
  recipe-maintainers:
    - thewchan
